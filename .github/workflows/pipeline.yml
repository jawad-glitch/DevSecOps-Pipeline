name: DevSecOps Pipeline
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
  sast:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
 
  dependency-audit:
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install pip-audit
        run: pip install pip-audit
 
      - name: Run Vulnerability Audit
        run: pip-audit -r app/requirements.txt
 
  unit-tests:
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install Dependencies
        run: pip install -r app/requirements.txt
 
      - name: Run Tests
        run: pytest app/ -v
 
  container-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Build Docker Image
        run: docker build -t devsecops-app:${{ github.sha }} .
 
      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
 
  push-to-ecr:
    runs-on: ubuntu-latest
    needs: container-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, Tag and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devsecops-demo-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

  deploy:
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
 
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
  aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
    docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
  docker pull ${{ secrets.ECR_REGISTRY }}/devsecops-demo-app:${{ github.sha }}
  cd /home/ec2-user/devsecops-pipeline
  export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
  export IMAGE_TAG=${{ github.sha }}
  docker compose up -d --no-deps webapp
