name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Automated Secrets Auditing
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
      runs-on: ubuntu-latest
      needs: secret-scan
      steps:
        - name: Checkout Repository Code
          uses: actions/checkout@v4

        - name: Run Semgrep
          uses: semgrep/semgrep-action@v1
          with:
            config: p/python
